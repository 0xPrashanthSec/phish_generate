version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# ECI Phishing Simulation Lab — Qevlar POC
# Isolated network. No external traffic generated.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  phishlab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  mailhog_data:
  artifacts_data:
  nginx_logs:

services:

  # ─────────────────────────────────────────────────────────────
  # MAILHOG — SMTP capture + web UI
  # SMTP  : localhost:1025
  # Web UI: http://localhost:8025
  # ─────────────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: phishlab-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      phishlab:
        ipv4_address: 172.28.0.10
    volumes:
      - mailhog_data:/home/mailhog
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # PHISH LANDING SERVER — serves fake login pages, tracks clicks
  # HTTP: http://localhost:8080
  # ─────────────────────────────────────────────────────────────
  landing-server:
    image: python:3.11-slim
    container_name: phishlab-landing
    working_dir: /app
    ports:
      - "8080:8080"
    networks:
      phishlab:
        ipv4_address: 172.28.0.20
    volumes:
      - artifacts_data:/artifacts:ro
      - ./landing_server:/app
    command: python server.py
    restart: unless-stopped
    depends_on:
      mailhog:
        condition: service_healthy
    environment:
      - FLASK_ENV=development
      - LOG_CLICKS=true

  # ─────────────────────────────────────────────────────────────
  # NGINX — reverse proxy + access log for IOC generation
  # HTTP: http://localhost:80
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: phishlab-nginx
    ports:
      - "80:80"
    networks:
      phishlab:
        ipv4_address: 172.28.0.30
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    depends_on:
      - landing-server

  # ─────────────────────────────────────────────────────────────
  # ARTIFACT GENERATOR — runs Python script, outputs to shared vol
  # Run: docker-compose run --rm artifact-gen --count 5
  # ─────────────────────────────────────────────────────────────
  artifact-gen:
    image: python:3.11-slim
    container_name: phishlab-generator
    working_dir: /scripts
    networks:
      - phishlab
    volumes:
      - ./scripts:/scripts:ro
      - artifacts_data:/artifacts
    command: >
      sh -c "pip install qrcode[pil] Pillow --quiet &&
             python generate_phishing_artifacts.py
               --output /artifacts
               --url http://phishtest.internal
               --count 3"
    profiles:
      - generate

  # ─────────────────────────────────────────────────────────────
  # EML INJECTOR — sends generated EMLs to MailHog via SMTP
  # Run: docker-compose run --rm eml-injector
  # ─────────────────────────────────────────────────────────────
  eml-injector:
    image: python:3.11-slim
    container_name: phishlab-injector
    working_dir: /scripts
    networks:
      - phishlab
    volumes:
      - ./scripts:/scripts:ro
      - artifacts_data:/artifacts:ro
    command: python inject_emails.py --smtp mailhog:1025 --artifacts /artifacts
    depends_on:
      mailhog:
        condition: service_healthy
    profiles:
      - inject
